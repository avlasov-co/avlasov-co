<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" role="img" aria-labelledby="title desc">
  <title id="title">Aleksander Vlasov</title>
  <desc id="desc">Minimal profile banner for a GitHub README.</desc>
  <defs>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d1d5db" stop-opacity="0"/>
